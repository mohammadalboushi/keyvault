<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>خزنة أسراري - حفظ كلمات المرور بأمان</title>
    
    <meta name="description" content="خزنة أسراري - تطبيق آمن وذكي لحفظ وإدارة كلمات المرور والحسابات.">
    <meta name="theme-color" content="#0d0f1a">
    <link rel="manifest" href="./manifest.json">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=100">
</head>
<body>

<header class="app-header" id="appHeader">
    <button class="icon-btn" onclick="safeToggleMenu(event)" aria-label="Open menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <circle cx="12" cy="12" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="19" r="2"/>
        </svg>
    </button>
    
    <div class="header-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>خزنة أسراري</span>
    </div>
    
    <div class="header-actions">
        <div class="sync-indicator" id="syncLoader" title="حالة المزامنة">
            <div class="sync-dot" id="syncDot"></div>
        </div>
        <button class="icon-btn" onclick="toggleTheme()" aria-label="Toggle theme">
            <span id="themeIcon" style="font-size: 18px;">🌙</span>
        </button>
    </div>
</header>

<div class="side-menu-overlay" id="sideMenuOverlay" onclick="safeToggleMenu(event)"></div>
<aside class="side-menu" id="sideMenu" onclick="event.stopPropagation()">
    <div class="side-menu-header">
        <div class="user-profile" id="userProfile">
            <div class="avatar" id="userAvatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="user-info">
                <span id="userName">مستخدم زائر</span>
                <span id="userEmail">سجل الدخول للمزامنة</span>
            </div>
        </div>
    </div>
    <nav class="side-menu-nav">
        
        <div id="emailLoginContainer">
            <button class="menu-item" onclick="openAuthModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                <span style="color: var(--primary);">تسجيل الدخول</span>
            </button>
        </div>

        <div id="emailLogoutContainer" style="display:none;">
            <button class="menu-item" onclick="handleLogout()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>تسجيل خروج</span>
            </button>
        </div>

        <div class="menu-divider"></div>

        <button class="menu-item" onclick="handleAppLockSettings()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span id="lockMenuText">إعدادات القفل</span>
        </button>

        <button class="menu-item" onclick="exportDataAuto()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>تصدير نسخة</span>
        </button>

        <button class="menu-item" onclick="document.getElementById('importFile').click()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>استيراد نسخة</span>
        </button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importDataWrapper(event)">

        <div class="menu-divider"></div>

        <button class="menu-item danger" onclick="confirmDeleteAll()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            <span>حذف البيانات</span>
        </button>

    </nav>
    <div class="side-menu-footer">خزنة أسراري v1.0</div>
</aside>

<div class="main-content container">
    <div style="margin-top: 10px;"></div>
    
    <input type="text" id="emailInput" class="app-input" placeholder="البريد الإلكتروني / العنوان" autocomplete="off">
    
    <div style="width: 100%; position: relative; margin-top: 15px;">
        <input type="text" id="passInput" class="app-input" placeholder="كلمة المرور" autocomplete="off">
    </div>
    
    <button class="btn btn-primary full-width" style="margin-top: 15px;" onclick="prepareSaveAccount()">
        <span>حفظ في الخزنة</span> 
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
    </button>

    <button id="vaultBtn" class="btn btn-secondary full-width" style="margin-top: 12px;"
            onclick="openVaultCheck()" 
            onmousedown="startVaultPress()" ontouchstart="startVaultPress()" 
            onmouseup="cancelVaultPress()" ontouchend="cancelVaultPress()"
            ontouchmove="cancelVaultPress()">
        <span>فتح المحفوظات</span> 
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
    </button>
</div>

<div id="authModal" class="overlay" onclick="goBack()">
    <div class="modal glass compact" onclick="event.stopPropagation()">
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="width: 60px; height: 60px; background: rgba(139, 92, 246, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--primary);">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
            </div>
            <h3 id="authTitle" style="margin-bottom: 5px;">تسجيل الدخول</h3>
            <p class="modal-sub" id="authSub">لحفظ ومزامنة بياناتك سحابياً</p>
        </div>

        <input type="email" id="authEmail" class="form-input" placeholder="البريد الإلكتروني" style="margin-bottom: 15px;">
        <input type="password" id="authPass" class="form-input" placeholder="كلمة المرور (6 أحرف على الأقل)">

        <div style="text-align: left; margin-top: 10px;">
            <a href="#" onclick="handleResetPassword()" style="color: var(--primary); font-size: 13px; text-decoration: none; font-weight: 600;">نسيت كلمة المرور؟</a>
        </div>

        <div class="modal-actions" style="flex-direction: column; margin-top: 25px;">
            <button class="btn btn-primary full-width" id="authSubmitBtn" onclick="submitAuth()">تسجيل الدخول</button>
            <button class="btn btn-secondary full-width" id="authToggleBtn" onclick="toggleAuthMode()">إنشاء حساب جديد</button>
        </div>
    </div>
</div>
<div id="vaultPage">
    <div class="vault-fixed-top">
        <div class="vault-header" style="margin-top: 60px;">
            <h2 class="vault-title">المحفوظات 📂</h2>
            <div class="header-actions">
                <button id="selectToggleBtn" class="icon-btn" onclick="toggleSelectionMode()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
                <button class="icon-btn back-btn" onclick="goBack()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 19 12 12 5"></polyline></svg>
                </button>
            </div>
        </div>

        <div style="display: flex; gap: 8px; margin-bottom: 5px; padding: 0 12px;">
            <div style="position: relative; flex: 1;">
                <svg style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-3);" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" class="search-input" style="padding-right: 40px;" placeholder="بحث سريع..." oninput="renderVault()">
                <div id="clearSearchBtn" onclick="clearSearch()" style="display:none; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); cursor:pointer; color:var(--danger); font-weight:bold; font-size:18px;">✕</div>
            </div>
            <button class="icon-btn" onclick="openSortModal()" style="border-radius: 99px; width: 42px; background: var(--surface); border: 1px solid var(--border);">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h12M3 18h6"/></svg>
            </button>
        </div>

        <div class="folders-bar" id="foldersBar">
            <div class="chip add-folder" onclick="openAddFolderModal()">+ مجلد جديد</div>
        </div>
    </div>

    <div id="vaultList" class="accounts-grid" style="padding-top: 10px;"></div>
    
    <div id="bottomBar" class="selection-bar" style="display: none; position: fixed; bottom: 0; width: 100%; z-index: 100;">
        <span id="selectedCount">محدد صفر</span>
        <div class="selection-actions">
            <button class="btn btn-sm btn-danger" onclick="deleteSelected()">حذف</button>
            <button class="btn btn-sm btn-secondary" onclick="openMoveModal()">نقل</button>
        </div>
    </div>
</div>

<div id="contextModal" class="overlay" onclick="goBack()">
    <div class="modal-clean" onclick="event.stopPropagation()">
        <div style="text-align: center; padding: 20px 0 10px 0; color: var(--accent); font-weight: 700;">خيارات</div>
        <div class="action-list">
            <div class="context-item" onclick="ctxAction('copy')">
                <svg width="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                <span>نسخ</span>
            </div>
            <div class="context-item" onclick="ctxAction('edit')">
                <svg width="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                <span>تعديل</span>
            </div>
            <div class="context-divider"></div>
            <div class="context-item danger" onclick="ctxAction('delete')">
                <svg width="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                <span>حذف</span>
            </div>
        </div>
    </div>
</div>

<div id="confirmModal" class="overlay">
    <div class="modal glass compact">
        <h3 id="confirmTitle">تنبيه</h3>
        <p class="modal-sub" id="confirmMessage">هل أنت متأكد؟</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="goBack()">إلغاء</button>
            <button class="btn btn-danger" id="confirmYesBtn">نعم</button>
        </div>
    </div>
</div>

<div id="passwordModal" class="overlay">
    <div class="modal glass compact">
        <h3 id="passModalTitle">أدخل الرمز</h3>
        <input type="password" id="globalPassInput" class="form-input" style="text-align:center; font-size:24px; letter-spacing:5px;" placeholder="••••" inputmode="numeric">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="goBack()">إلغاء</button>
            <button class="btn btn-primary" onclick="submitPassword()">تأكيد</button>
        </div>
    </div>
</div>

<div id="folderSelectModal" class="overlay" onclick="goBack()">
    <div class="modal glass compact" onclick="event.stopPropagation()">
        <h3 id="folderModalTitle">اختر المجلد</h3>
        <div class="move-folder-list" id="folderListModalBody"></div>
        <div class="modal-actions"><button class="btn btn-secondary full-width" onclick="goBack()">إلغاء</button></div>
    </div>
</div>

<div id="addFolderModal" class="overlay">
    <div class="modal glass compact">
        <h3 id="addFolderTitle">مجلد جديد</h3>
        <input type="text" id="folderNameInput" class="form-input" placeholder="اسم المجلد">
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="goBack()">إلغاء</button>
            <button class="btn btn-primary" onclick="submitFolder()">حفظ</button>
        </div>
    </div>
</div>

<div id="sortModal" class="overlay" onclick="goBack()">
    <div class="modal-clean glass" onclick="event.stopPropagation()">
        <div style="text-align: center; padding: 20px 0 10px 0; color: var(--accent); font-weight: 700;">ترتيب حسب</div>
        <div class="action-list">
            <div class="context-item" onclick="applySort('newest')">
                <span>الأحدث</span>
                <span id="check-newest" style="color:var(--accent); font-weight:bold; display:none; margin-right: auto;">✔</span>
            </div>
            <div class="context-item" onclick="applySort('oldest')">
                <span>الأقدم</span>
                <span id="check-oldest" style="color:var(--accent); font-weight:bold; display:none; margin-right: auto;">✔</span>
            </div>
            <div class="context-item" onclick="applySort('az')">
                <span>أ - ي</span>
                <span id="check-az" style="color:var(--accent); font-weight:bold; display:none; margin-right: auto;">✔</span>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="script.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker Registered!', reg))
      .catch(err => console.error('Service Worker Registration Failed!', err));
  }
</script>

</body>
</html>
